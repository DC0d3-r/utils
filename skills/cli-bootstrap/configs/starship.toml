# ==============================================================================
#  Starship Prompt — "Wavefront" v1.0-final
#  Minimal zen prompt: quiet colors, clean structure, nothing unnecessary.
#  With fill module for HUD layout and transient prompt support.
#
#  Edge-case fixes incorporated:
#  - Directory substitutions for common project roots (context in deep nesting)
#  - Updated waveAqua to #6DB5A8 (green/cyan hue separation fix)
# ==============================================================================

format = """
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$cmd_duration\
$time
$character"""

right_format = ""

# Continuation: just a quiet indent.
continuation_prompt = "[  ](fg:mist)"

add_newline = true
command_timeout = 1000

palette = "wavefront"


# --- Line 1 Left: Where You Are ---------------------------------------------

[directory]
style = "fg:crystalBlue"
format = "[$path]($style)[$read_only]($style)"
truncation_length = 3
truncation_symbol = ".../"
read_only = "  "
read_only_style = "fg:autumnLeaf"

# EDGE-CASE FIX: directory substitutions for common project roots.
# Prevents context loss in deeply nested paths (e.g., .../2026/march/ becomes
# homelab/.../march/ so you know which project you are in).
[directory.substitutions]
"~/code/homelab" = "homelab"
"~/code/portfolio-tracker" = "portfolio"
"~/code/claw" = "claw"
"~" = "~"

[git_branch]
symbol = " "
style = "fg:oniViolet"
format = " [$symbol$branch]($style)"

[git_status]
style = "fg:sandGold"
format = " [$all_status$ahead_behind]($style)"
conflicted = "= "
ahead = "up${count} "
behind = "dn${count} "
diverged = "div "
untracked = "? "
stashed = "* "
modified = "! "
staged = "+ "
renamed = "~ "
deleted = "x "

# No package version — unnecessary visual noise.
[package]
disabled = true


# --- Fill: the measured space between ----------------------------------------

[fill]
symbol = " "
style = "fg:stone"


# --- Line 1 Right: Context (only when relevant) -----------------------------

[nodejs]
symbol = "node "
style = "fg:clay"
format = "[$symbol$version]($style) "
detect_files = ["package.json", ".nvmrc"]

[python]
symbol = "py "
style = "fg:clay"
format = "[$symbol$version]($style) "
detect_files = ["requirements.txt", "pyproject.toml", ".python-version"]

[rust]
symbol = "rs "
style = "fg:clay"
format = "[$symbol$version]($style) "

[golang]
symbol = "go "
style = "fg:clay"
format = "[$symbol$version]($style) "

[docker_context]
symbol = "docker "
style = "fg:clay"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile", "compose.yml", "compose.yaml"]

[cmd_duration]
min_time = 3000
style = "fg:ash italic"
format = "[$duration]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:ash"
format = "[$time]($style)"


# --- Line 2: The Prompt -----------------------------------------------------

[character]
# A simple arrow. Not a glyph, not a symbol — just direction.
success_symbol = "[>](fg:crystalBlue)"
error_symbol = "[>](fg:autumnLeaf)"
vimcmd_symbol = "[<](fg:sandGold)"


# --- Wavefront Palette -------------------------------------------------------
# Named after natural materials, not technical terms.
# Cyan updated: H:165 -> H:180 for green/cyan separation.

[palettes.wavefront]
# Background surfaces
void      = "#111117"
ink       = "#16161D"
sumi      = "#1F1F28"
stone     = "#2A2A37"
pebble    = "#363646"
drift     = "#44445B"
mist      = "#54546D"
fog       = "#65657A"

# Foreground tones
ash       = "#727169"
clay      = "#938E7E"
parchment = "#C8C093"
ivory     = "#DCD7BA"
silk      = "#EDEAD5"

# Accent colors — muted, painterly (red & green refined, cyan shifted)
autumnLeaf  = "#D0605A"
mossGreen   = "#7BA888"
sandGold    = "#C4B28A"
crystalBlue = "#7E9CD8"
oniViolet   = "#957FB8"
waveAqua    = "#6DB5A8"

# Bright accents
waveRed     = "#E8685E"
springGreen = "#8FBF96"
carpYellow  = "#DEB97D"
springBlue  = "#7FB4CA"
springViolet = "#B09FD6"
waveAqua2   = "#82CCBE"
