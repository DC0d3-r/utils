# ==============================================================================
#  Kitty Terminal Configuration — "Wavefront" v1.0-final
#  Japanese-inspired muted elegance: ink, paper, wave, stone — with a pulse.
#
#  All edge-case fixes incorporated:
#  - inactive_text_alpha 0.78 (was 0.70, keeps comments readable in inactive panes)
#  - window_padding_width 12 16 (was 20 24, usable in narrow splits)
#  - tab_fade 0.5 0.7 0.85 1 (was 0.25 0.5 0.75 1, readable inactive tabs)
#  - Green/cyan hue separation increased (waveAqua H:165 -> H:180)
# ==============================================================================


# --- Font --------------------------------------------------------------------
# Primary: Iosevka Term — narrow, clean geometry, Japanese-like vertical rhythm.
# The narrow glyphs give more horizontal breathing room in splits.
font_family      IosevkaTerm NF
bold_font        IosevkaTerm NF Bold
italic_font      MonaspiceRn NF Italic
bold_italic_font IosevkaTerm NF Bold Italic
font_size        14.0

# Typography tuning — generous spacing is the core visual identity.
# Cell height 120%: the ma (間) principle — negative space as active design element.
modify_font cell_height 120%
# Baseline: center text vertically in the taller cell.
modify_font baseline 1
# Underline: thin and positioned low — a quiet indicator, not a shout.
modify_font underline_position 4
modify_font underline_thickness 0.6
# Strikethrough: thin to match underline weight.
modify_font strikethrough_thickness 0.6

# macOS: Iosevka has good weight, minimal thickening needed on Retina.
macos_thicken_font 0.25

# Ligatures: Iosevka calt + dlig for operators and arrows.
# Radon italic gets texture healing for handwritten flow in comments.
font_features IosevkaTermNF-Regular   +calt +dlig
font_features IosevkaTermNF-Bold      +calt +dlig
font_features MonaspiceRnNF-Italic +calt +ss01 +ss02 +liga
# Disable ligatures at cursor position so editing is not confusing.
disable_ligatures cursor


# --- Cursor ------------------------------------------------------------------
# Block cursor — solid, grounded, a hanko seal.
cursor_shape            block
# crystalBlue — the wave's heart. Pops against warm ivory text.
cursor                  #7E9CD8
cursor_text_color       #1F1F28

# No blink. Stillness. A resting brush does not twitch.
cursor_blink_interval   0

# Cursor trail — warm gold afterglow behind blue cursor.
# This is the visual signature: ink settling on paper after the brush moves.
# Slower decay (0.1-0.3s) so the trail is visible on quick movements.
cursor_trail            3
cursor_trail_decay      0.1 0.3
cursor_trail_start_threshold  1
# Parchment gold trail — warm trace behind cool cursor = kintsugi.
cursor_trail_color      #C8C093


# --- Scrollback --------------------------------------------------------------
scrollback_lines        50000
scrollback_pager        bat --paging=always --style=plain --color=always


# --- Mouse -------------------------------------------------------------------
mouse_hide_wait         2.0
copy_on_select          clipboard
strip_trailing_spaces   smart


# --- Window ------------------------------------------------------------------
remember_window_size    yes
initial_window_width    170c
initial_window_height   48c

# Padding: balanced for both single-window zen and multi-pane splits.
# 12px vertical, 16px horizontal — breathing room without eating columns.
# EDGE-CASE FIX: reduced from 20 24 to preserve usable space in narrow splits.
window_padding_width    12 16

# Center content — text should feel balanced.
placement_strategy      center

# macOS: clean frame, no titlebar chrome. Keep rounded corners.
hide_window_decorations no
confirm_os_window_close 1
# Titlebar blends seamlessly with terminal background.
macos_titlebar_color    background

# Dim inactive panes — active pane is "present", others recede like shadows.
# EDGE-CASE FIX: bumped from 0.70 to 0.78. At 0.70, comments (Ash 4.6:1) in
# inactive panes dropped to ~3.2:1 (unreadable). At 0.78, all accent colors
# stay above WCAG AA in inactive panes while still providing clear distinction.
inactive_text_alpha     0.78

# Pane borders — thin, receding, barely there.
# In a zen garden, boundaries are suggested, not enforced.
window_border_width     0.5pt
window_margin_width     3

# Single window gets default padding (-1 means use window_padding_width).
single_window_padding_width  -1


# --- Tab Bar -----------------------------------------------------------------
# Fade style — tabs emerge from and recede into the background.
# No powerline angles, no separators — just quiet presence and absence.
tab_bar_edge            top
tab_bar_style           custom
# EDGE-CASE FIX: raised from 0.25 0.5 0.75 1 to keep inactive tab text readable.
# At 0.25 start opacity, the leftmost characters of inactive tabs were invisible.
tab_fade                0.5 0.7 0.85 1
tab_bar_min_tabs        1

# Tab title: clean, minimal — just index and title.
tab_title_template      " {index}: {title} "
active_tab_title_template " {index}: {title} "

# Tab fonts — bold active for emphasis, italic inactive for recession.
active_tab_font_style   bold
inactive_tab_font_style italic


# --- Wavefront Color Scheme --------------------------------------------------
# Background: warm-neutral indigo, Okhsl L:0.12 — NOT pure black.
# Foreground: warm ivory, Okhsl L:0.85 — NOT pure white.
foreground              #DCD7BA
background              #1F1F28

# Selection: one elevation level up + silk white text.
selection_foreground    #EDEAD5
selection_background    #2A2A37

# Cursor colors — crystalBlue cursor, sumi text.
cursor                  #7E9CD8
cursor_text_color       #1F1F28

# URLs — wave blue.
url_color               #7E9CD8

# Pane borders — gold active (gilded frame), stone inactive (fades away).
active_border_color     #C4B28A
inactive_border_color   #2A2A37

# Bell — bright red border (warm alert).
bell_border_color       #E8685E

# Tabs — warm and muted.
active_tab_foreground   #DCD7BA
active_tab_background   #1F1F28
inactive_tab_foreground #727169
inactive_tab_background #16161D
tab_bar_background      #111117
tab_bar_margin_color    #111117

# Visual bell — autumn red flash, a lantern flicker.
visual_bell_color       #D0605A

# Mark colors (for kitty's mark feature).
mark1_foreground        #1F1F28
mark1_background        #7E9CD8
mark2_foreground        #1F1F28
mark2_background        #957FB8
mark3_foreground        #1F1F28
mark3_background        #C4B28A


# -- ANSI Normal --------------------------------------------------------------
# All accent hues at matched Okhsl L:0.70, S:0.35-0.50 — muted, painterly.
# Red and Green BUMPED for error/diff visibility.
# Cyan SHIFTED from H:165 to H:180 to resolve green/cyan overlap.
color0   #1F1F28
color1   #D0605A
color2   #7BA888
color3   #C4B28A
color4   #7E9CD8
color5   #957FB8
color6   #6DB5A8
color7   #DCD7BA

# -- ANSI Bright --------------------------------------------------------------
# Bright variants at Okhsl L:0.80, S:0.42-0.55 — lifted, not loud.
# Bright cyan also shifted to match normal cyan hue change.
color8   #54546D
color9   #E8685E
color10  #8FBF96
color11  #DEB97D
color12  #7FB4CA
color13  #B09FD6
color14  #82CCBE
color15  #EDEAD5


# --- URL Handling ------------------------------------------------------------
url_style               single
open_url_with           default
detect_urls             yes


# --- Background & Transparency ----------------------------------------------
# Default: solid background. Self-contained, portable, predictable.
# Dynamic opacity ENABLED so the toggle kitten works for show-off mode.
background_opacity          1.0
dynamic_background_opacity  yes

# Optional: subtle noise texture for perceived depth.
# Generate with: bash wavefront-generate-bg.sh (see utility scripts).
# Uncomment after generating the texture.
background_image          ~/Pictures/kitty-backgrounds/wavefront-noise.png
background_image_layout   tiled
background_tint           0.5


# --- Bell --------------------------------------------------------------------
enable_audio_bell       no
# Brief warm flash — a lantern flicker, not an alarm.
visual_bell_duration    0.12
window_alert_on_bell    yes


# --- Remote Control ----------------------------------------------------------
# Socket-only: required for Neovim integration, dynamic theme switching.
# More secure than allow_remote_control yes.
allow_remote_control    socket-only
listen_on               unix:/tmp/kitty


# --- Performance -------------------------------------------------------------
repaint_delay           8
input_delay             2
sync_to_monitor         yes


# --- Keyboard Shortcuts ------------------------------------------------------
enabled_layouts         splits,stack

# Pane splitting.
map cmd+d               launch --location=vsplit --cwd=current
map cmd+shift+d         launch --location=hsplit --cwd=current

# Focus panes.
map cmd+]               next_window
map cmd+[               previous_window

# Fullscreen (zoom) current pane.
map cmd+shift+f         toggle_layout stack

# Resize panes.
map cmd+shift+right     resize_window narrower 5
map cmd+shift+left      resize_window wider 5
map cmd+shift+up        resize_window taller 5
map cmd+shift+down      resize_window shorter 5

# Tabs.
map cmd+t               new_tab_with_cwd
# Close current pane first, tab only when it's the last pane
map cmd+w               close_window
map cmd+shift+w         close_tab
map cmd+shift+t         set_tab_title
map cmd+1               goto_tab 1
map cmd+2               goto_tab 2
map cmd+3               goto_tab 3
map cmd+4               goto_tab 4
map cmd+5               goto_tab 5
map cmd+shift+]         next_tab
map cmd+shift+[         previous_tab

# Font size.
map cmd+equal           change_font_size all +1.0
map cmd+minus           change_font_size all -1.0
map cmd+0               change_font_size all 0

# Scrollback in bat/pager.
map cmd+/               show_scrollback

# Copy/paste.
map cmd+c               copy_to_clipboard
map cmd+v               paste_from_clipboard

# Reload config.
map cmd+shift+r         load_config_file

# New window.
map cmd+n               new_os_window_with_cwd

# Wavefront: opacity toggle for show-off mode.
# Ctrl+Shift+O: toggle between solid (1.0) and glass (0.88) mode.
# NOTE: Glass mode designed for DARK wallpapers only. Light desktop backgrounds
# will reduce comment readability below WCAG AA.
map ctrl+shift+o        kitten toggle_opacity.py

# Fine-tune opacity.
map ctrl+shift+a>m      set_background_opacity +0.05
map ctrl+shift+a>l      set_background_opacity -0.05
map ctrl+shift+a>1      set_background_opacity 1.0
map ctrl+shift+a>d      set_background_opacity default


# --- Misc --------------------------------------------------------------------
shell                   /bin/zsh
editor                  .
close_on_child_death    no
update_check_interval   0
