# Foreground tones
ash       = "#8080A0"
clay      = "#9898B8"
parchment = "#B8B8D0"
ivory     = "#D0CBE4"
silk      = "#E8E4F0"

# Accent colors
autumnLeaf  = "#FF6B6B"
mossGreen   = "#50FA7B"
sandGold    = "#F1FA8C"
crystalBlue = "#6C99FF"
oniViolet   = "#BD93F9"
waveAqua    = "#8BE9FD"

# Bright accents
waveRed     = "#FF8585"
springGreen = "#69FF93"
carpYellow  = "#F5FCA5"
springBlue  = "#85ADFF"
springViolet = "#D0A8FF"
waveAqua2   = "#A4F1FF"
