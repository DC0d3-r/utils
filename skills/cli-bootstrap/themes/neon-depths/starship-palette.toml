# Theme: Neon Depths — Starship palette
# Include via: palette = "neon-depths" in your starship.toml

[palettes.neon-depths]
# Background surfaces
void      = "#0D0D14"
ink       = "#12121C"
sumi      = "#181824"
stone     = "#22222E"
pebble    = "#2C2C3A"
drift     = "#3A3A4A"
mist      = "#4A4A5C"
