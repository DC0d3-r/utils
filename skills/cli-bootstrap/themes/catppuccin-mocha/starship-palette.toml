# Theme: Catppuccin Mocha — Starship palette
# Include via: palette = "catppuccin-mocha" in your starship.toml

[palettes.catppuccin-mocha]
# Background surfaces
void      = "#181825"
ink       = "#181825"
sumi      = "#1E1E2E"
stone     = "#313244"
pebble    = "#45475A"
drift     = "#585B70"
mist      = "#585B70"
fog       = "#6C7086"

# Foreground tones
ash       = "#6C7086"
clay      = "#7F849C"
parchment = "#9399B2"
ivory     = "#BAC2DE"
silk      = "#CDD6F4"

# Accent colors
autumnLeaf  = "#F38BA8"
mossGreen   = "#A6E3A1"
sandGold    = "#F9E2AF"
crystalBlue = "#89B4FA"
oniViolet   = "#CBA6F7"
waveAqua    = "#94E2D5"

# Bright accents (Catppuccin uses same colors for normal/bright)
waveRed     = "#F38BA8"
springGreen = "#A6E3A1"
carpYellow  = "#F9E2AF"
springBlue  = "#89B4FA"
springViolet = "#CBA6F7"
waveAqua2   = "#94E2D5"

# Catppuccin-specific extras
rosewater  = "#F5E0DC"
flamingo   = "#F2CDCD"
pink       = "#F5C2E7"
mauve      = "#CBA6F7"
maroon     = "#EBA0AC"
peach      = "#FAB387"
teal       = "#94E2D5"
sky        = "#89DCFE"
sapphire   = "#74C7EC"
lavender   = "#B4BEFE"
