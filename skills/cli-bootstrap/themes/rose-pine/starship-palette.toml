# Theme: Rose Pine — Starship palette
# Include via: palette = "rose-pine" in your starship.toml

[palettes.rose-pine]
# Background surfaces
void      = "#191724"
ink       = "#1F1D2E"
sumi      = "#191724"
stone     = "#26233A"
pebble    = "#312F44"
drift     = "#403D52"
mist      = "#403D52"
fog       = "#555169"

# Foreground tones
ash       = "#555169"
clay      = "#6E6A86"
parchment = "#908CAA"
ivory     = "#E0DEF4"
silk      = "#E0DEF4"

# Accent colors
autumnLeaf  = "#EB6F92"
mossGreen   = "#31748F"
sandGold    = "#F6C177"
crystalBlue = "#9CCFD8"
oniViolet   = "#C4A7E7"
waveAqua    = "#EBBCBA"

# Bright accents (Rose Pine uses same colors for normal/bright)
waveRed     = "#EB6F92"
springGreen = "#31748F"
carpYellow  = "#F6C177"
springBlue  = "#9CCFD8"
springViolet = "#C4A7E7"
waveAqua2   = "#EBBCBA"

# Rose Pine-specific extras
rose    = "#EBBCBA"
pine    = "#31748F"
foam    = "#9CCFD8"
iris    = "#C4A7E7"
gold    = "#F6C177"
love    = "#EB6F92"
subtle  = "#908CAA"
muted   = "#6E6A86"
