<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper:        #ede4d0;
  --paper-warm:   #e3d8bf;
  --paper-dark:   #d9ceb4;
  --paper-edge:   #c4b89d;
  --ink:          #1a1f2e;
  --ink-soft:     #3a4256;
  --ink-fade:     #6c7388;
  --vermilion:    #c8421e;
  --saffron:      #d9941a;
  --verdigris:    #6b8e7f;
  --crimson:      #8b3a3a;
  --gold:         #b08544;
  --gold-deep:    #8a6418;
  --rule:         #c4b89d;
  --rule-faint:   #d4c8ad;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Spectral', Georgia, serif;
  font-weight: 400;
  font-size: 17px;
  line-height: 1.7;
  scroll-behavior: smooth;
}

::selection { background: var(--saffron); color: var(--ink); }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 100;
  pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10 0 0 0 0 0.12 0 0 0 0 0.18 0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: 0.35;
  mix-blend-mode: multiply;
}

.watermark {
  position: absolute;
  font-family: 'Fraunces', serif;
  color: var(--ink); opacity: 0.04;
  font-weight: 900; pointer-events: none; user-select: none; z-index: 0;
  font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
}
.wm-1 { top: 4rem;   right: -3rem;  font-size: 18rem; }
.wm-2 { top: 50%;    left: -5rem;   font-size: 22rem; transform: rotate(-12deg); }

main { max-width: 1100px; margin: 0 auto; padding: 4.5rem 2rem 6rem; position: relative; z-index: 1; }

.crumbs {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-fade);
  margin-bottom: 2.5rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.crumbs a {
  color: var(--vermilion);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color .18s;
}
.crumbs a:hover { border-bottom-color: var(--saffron); }
.crumbs .sep { color: var(--saffron); }

header.page-header {
  text-align: center;
  margin-bottom: 4.5rem;
  padding-bottom: 2.5rem;
  border-bottom: 1px solid var(--rule);
}

.kicker {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 1.6rem;
}
.kicker::before { content: '◆ '; color: var(--saffron); margin-right: 0.4em; }
.kicker::after  { content: ' ◆'; color: var(--saffron); margin-left: 0.4em; }

h1 {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: clamp(2.4rem, 6vw, 4.6rem);
  line-height: 1.02;
  letter-spacing: -0.025em;
  font-variation-settings: 'opsz' 144, 'SOFT' 50, 'WONK' 1;
  color: var(--ink);
  margin-bottom: 1.4rem;
}
h1 em {
  font-style: italic; font-weight: 500; color: var(--vermilion);
  font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
}

.subtitle {
  font-family: 'Spectral', serif;
  font-style: italic; font-weight: 300;
  font-size: clamp(1.15rem, 2vw, 1.4rem);
  color: var(--ink-soft);
  max-width: 60ch;
  margin: 0 auto 1.8rem;
  line-height: 1.5;
}

.meta-bar {
  display: inline-flex; gap: 1.4rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink-fade);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.meta-bar .dot { color: var(--saffron); }

article {
  max-width: 720px;
  margin: 0 auto;
  font-size: 1.05rem;
}

article h2 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: clamp(1.7rem, 3.2vw, 2.2rem);
  line-height: 1.18;
  letter-spacing: -0.012em;
  margin: 4rem 0 1.5rem;
  color: var(--ink);
  border-top: 1px solid var(--rule);
  padding-top: 2.4rem;
  font-variation-settings: 'opsz' 96, 'SOFT' 50, 'WONK' 1;
}
article h2:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
article h2 em { font-style: italic; color: var(--vermilion); font-weight: 500; }

article h3 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 1.25rem;
  line-height: 1.3;
  margin: 2.4rem 0 0.85rem;
  color: var(--ink);
  letter-spacing: -0.005em;
}

article h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.74rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin: 2rem 0 0.7rem;
}

article p { margin-bottom: 1.35rem; color: var(--ink); }

article p.lead {
  font-size: 1.22rem;
  line-height: 1.55;
  color: var(--ink);
  margin-bottom: 2rem;
}
article p.lead::first-letter {
  font-family: 'Fraunces', serif;
  font-style: italic; font-weight: 500;
  font-size: 5em;
  float: left;
  line-height: 0.86;
  margin: 0.08em 0.12em 0 -0.05em;
  color: var(--gold-deep);
  font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
}

article a {
  color: var(--vermilion);
  text-decoration: none;
  border-bottom: 1px solid var(--rule);
  transition: color .18s, border-color .18s;
}
article a:hover { color: var(--crimson); border-bottom-color: var(--saffron); }

article em { font-style: italic; }
article strong { font-weight: 600; color: var(--ink); }

article code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  font-weight: 400;
  color: var(--verdigris);
  background: rgba(107, 142, 127, 0.08);
  padding: 0.08em 0.4em;
  border-radius: 1px;
}

article pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.6;
  color: var(--ink);
  background: var(--paper-warm);
  border: 1px solid var(--rule-faint);
  border-left: 3px solid var(--saffron);
  padding: 1.2rem 1.4rem;
  margin: 1.6rem 0;
  overflow-x: auto;
  border-radius: 1px;
}
article pre code { background: none; padding: 0; color: inherit; font-size: inherit; }

article blockquote {
  font-family: 'Fraunces', serif;
  font-style: italic; font-weight: 400;
  font-size: 1.15rem;
  line-height: 1.5;
  color: var(--ink-soft);
  border-left: 2px solid var(--saffron);
  padding: 0.4rem 0 0.4rem 1.6rem;
  margin: 1.8rem 0;
  font-variation-settings: 'opsz' 96, 'SOFT' 80;
}

article ul, article ol { margin: 1.2rem 0 1.6rem 1.8rem; }
article li { margin-bottom: 0.55rem; line-height: 1.55; }
article li::marker { color: var(--gold-deep); }

article hr {
  border: none; height: 1px; background: var(--rule);
  margin: 3rem auto; max-width: 200px;
}

article table {
  width: 100%; border-collapse: collapse;
  margin: 1.8rem 0; font-size: 0.94rem;
}
article th, article td {
  text-align: left; padding: 0.75rem 0.95rem;
  border-bottom: 1px solid var(--rule-faint);
  vertical-align: top;
}
article th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gold-deep);
  font-weight: 600;
  border-bottom: 1px solid var(--rule);
}
article tr:hover td { background: var(--paper-warm); }

article .callout {
  background: var(--paper-warm);
  border-left: 3px solid var(--vermilion);
  padding: 1.4rem 1.6rem;
  margin: 2rem 0;
  font-family: 'Fraunces', serif;
  font-size: 1.12rem;
  font-style: italic;
  color: var(--ink);
  line-height: 1.5;
  font-variation-settings: 'opsz' 96, 'SOFT' 80;
}
article .callout .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--vermilion);
  font-style: normal; font-weight: 600;
  display: block; margin-bottom: 0.5rem;
}

footer.colophon {
  max-width: 720px; margin: 5rem auto 0;
  padding-top: 2.5rem; border-top: 1px solid var(--rule);
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-fade);
}
footer.colophon .ornament { color: var(--saffron); margin-bottom: 0.8rem; font-size: 0.85rem; }
footer.colophon .ref a { color: var(--ink-fade); border-bottom: 1px solid transparent; text-decoration: none; }
footer.colophon .ref a:hover { color: var(--vermilion); border-bottom-color: var(--saffron); }

@media (max-width: 720px) {
  main { padding: 3rem 1.4rem 4rem; }
  header.page-header { margin-bottom: 3rem; padding-bottom: 1.8rem; }
  article h2 { margin-top: 3rem; padding-top: 2rem; }
}
</style>
</head>
<body>

<main>
  <span class="watermark wm-1">{{WATERMARK_1}}</span>
  <span class="watermark wm-2">{{WATERMARK_2}}</span>

  <nav class="crumbs">
    <a href="/">The Bhandar</a>
    <span class="sep">◆</span>
    <span>{{KICKER}}</span>
  </nav>

  <header class="page-header">
    <div class="kicker">{{KICKER}}</div>
    <h1>{{H1_HTML}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <div class="meta-bar">{{META_BAR_HTML}}</div>
  </header>

  <article>
{{BODY}}
  </article>

  <footer class="colophon">
    <div class="ornament">◆ &nbsp; ◆ &nbsp; ◆</div>
    <div class="ref">A volume in <a href="/">Brahma's Bhandar</a> &middot; {{DATE}}</div>
  </footer>
</main>

</body>
</html>
